<!DOCTYPE html>
<html>
<head>
  <meta name="robots" content="noindex">
  <meta charset="UTF-8">
  <title>Grate Western Trail Calculator</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900|Material+Icons" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/vuetify/dist/vuetify.min.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui">
</head>
<body>
<div id="app">
  <v-app id="inspire">
    <v-toolbar color="indigo"><v-toolbar-title>
    <span class="white--text">
    Grate Western Trail Calculator
    </span>
    </v-toolbar-title></v-toolbar>
    <v-form>
      <v-container>
        <v-layout row wrap>
          <v-flex xs6 sm6 md6>
            <v-text-field label="合計" v-model="result" readonly>
            </v-text-field>
          </v-flex>
          <v-flex xs6 sm6 md6>
            <v-btn color="indigo" dark v-on:click="run">
              <v-icon dark>gavel</v-icon>
            </v-btn>
          </v-flex>
          <v-flex xs3 sm3 md3>
            <v-text-field label="お金" v-model="scores[0]" type="number">
            </v-text-field>
          </v-flex>
          <v-flex xs3 sm3 md3>
            <v-text-field label="建物" v-model="scores[1]" type="number">
            </v-text-field>
          </v-flex>
          <v-flex xs3 sm3 md3>
            <v-text-field label="都市" v-model="scores[2]" type="number">
            </v-text-field>
          </v-flex>
          <v-flex xs3 sm3 md3>
            <v-text-field label="駅" v-model="scores[3]" type="number">
            </v-text-field>
          </v-flex>
          <v-flex xs3 sm3 md3>
            <v-text-field label="災害" v-model="scores[4]" type="number">
            </v-text-field>
          </v-flex>
          <v-flex xs3 sm3 md3>
            <v-text-field label="家畜" v-model="scores[5]" type="number">
            </v-text-field>
          </v-flex>
          <v-flex xs3 sm3 md3>
            <v-text-field label="目的" v-model="scores[6]" type="number">
            </v-text-field>
          </v-flex>
          <v-flex xs3 sm3 md3>
            <v-text-field label="駅長" v-model="scores[7]" type="number">
            </v-text-field>
          </v-flex>
          <v-flex xs3 sm3 md3>
            <v-text-field label="労働者" v-model="scores[8]" type="number">
            </v-text-field>
          </v-flex>
          <v-flex xs3 sm3 md3>
            <v-text-field label="ボード" v-model="scores[9]" type="number">
            </v-text-field>
          </v-flex>
          <v-flex xs3 sm3 md3>
            <v-text-field label="労働市場トークン" v-model="scores[10]"
                          type="number">
            </v-text-field>
          </v-flex>
        </v-layout>
      </v-container>
    </v-form>
    <v-footer color="indigo" app inset>
      <span class="white--text">&copy; 2019</span>
    </v-footer>
  </v-app>
</div>
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify/dist/vuetify.js"></script>
  <script src="grate_material.js"></script>
</body>
</html>
